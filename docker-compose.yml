version: '3.8'

# ============================================================
# SOFTVET - docker-compose.yml
# ============================================================
# Uso:
#   docker compose up --build        (primera vez / tras cambios)
#   docker compose up -d --build     (en segundo plano)
#   docker compose down              (apagar todo)
#   docker compose down -v           (apagar y borrar datos de MySQL)
#   docker compose logs -f <nombre>  (ver logs de un servicio)
# ============================================================

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    ports:
      - "3307:3306"   # host:3307 -> container:3306
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - softvet-net

  # ------------------------------------------------------------
  # EUREKA SERVER
  # ------------------------------------------------------------
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - softvet-net

  # ------------------------------------------------------------
  # API GATEWAY
  # ------------------------------------------------------------
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      - eureka-server
    networks:
      - softvet-net

  # ------------------------------------------------------------
  # MICROSERVICIOS
  # ------------------------------------------------------------

  autenticacion:
    build: ./autenticacion
    container_name: autenticacion
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/autenticacion?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
    depends_on:
      eureka-server:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - softvet-net

  fichamedica:
    build: ./fichamedica
    container_name: ficha
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ficha?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
    depends_on:
      eureka-server:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - softvet-net

  servicios:
    build: ./servicios
    container_name: servicios
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/servicios?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
    depends_on:
      eureka-server:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - softvet-net

  reservas:
    build: ./reservas
    container_name: reservas
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
