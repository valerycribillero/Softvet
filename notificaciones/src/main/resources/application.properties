spring.application.name=notificaciones

server.port=8088

# BASE DE DATOS
spring.datasource.url=jdbc:mysql://localhost:3306/notificaciones
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SWAGGER
springdoc.swagger-ui.path=/swagger-ui.html

#Eureka
eureka.client.registrer-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-adress=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=127.0.0.1
eureka.instance.instance-id=127.0.0.1:${spring.application.name}:${server.port}
