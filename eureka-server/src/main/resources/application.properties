# ============================================================
# Eureka Server - application.properties
# ============================================================

# Puerto estandar de industria para Eureka
server.port=8761

spring.application.name=eureka-server

# ============================================================
# CRITICO: evitar que Eureka se registre en si mismo.
# Por defecto incluye las librerias cliente tambien, lo que
# genera errores y warnings en consola si no se configura esto.
# ============================================================
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost

logging.level.com.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO
spring.main.allow-bean-definition-overriding=true

